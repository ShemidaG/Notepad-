<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notepad MVP</title>
  <link rel="stylesheet" href="app/styles.css" />
</head>
<body>
  <div id="toast"></div>
  <header>
    <h1>Notepad MVP</h1>
    <div class="row">
      <button id="exportBtn">Export JSON</button>
      <label class="file-label">Import JSON<input id="importInput" type="file" accept="application/json" hidden /></label>
      <button id="searchToggle">Search</button>
    </div>
  </header>
  <main class="layout">
    <aside class="left">
      <div class="section-title">Workspaces</div>
      <div class="row">
        <select id="workspaceSelect"></select>
        <button id="addWorkspaceBtn">+</button>
      </div>
      <div class="row">
        <button id="renameWorkspaceBtn">Rename</button>
        <button id="deleteWorkspaceBtn">Delete</button>
      </div>
      <div class="section-title">Folders & Notes</div>
      <div class="row">
        <button id="addFolderBtn">New Folder</button>
        <button id="addNoteBtn">New Note</button>
      </div>
      <div id="tree"></div>
    </aside>

    <section class="center">
      <div id="bannerWrap"></div>
      <div class="row sticky">
        <input id="noteTitle" placeholder="Note title" />
        <label class="file-label">Banner<input id="bannerInput" type="file" accept="image/*" hidden /></label>
        <button id="removeBannerBtn">Remove Banner</button>
      </div>
      <div class="toolbar">
        <button data-cmd="bold">B</button><button data-cmd="italic">I</button><button data-cmd="underline">U</button><button data-cmd="strikeThrough">S</button>
        <button data-block="H1">H1</button><button data-block="H2">H2</button><button data-block="H3">H3</button>
        <button id="checkboxBtn">☑</button>
        <label class="file-label">Insert Image<input id="imageInput" type="file" accept="image/*" hidden /></label>
      </div>
      <div id="editor" contenteditable="true"></div>
    </section>

    <aside class="right">
      <div class="section-title">Calendar</div>
      <div class="row"><button id="prevMonth">◀</button><div id="monthLabel"></div><button id="nextMonth">▶</button></div>
      <div id="weekdayHeader"></div>
      <div id="calendar"></div>
      <button id="todayBtn">Go to Today</button>

      <div class="section-title">Today Panel</div>
      <div class="row"><input id="taskTitle" placeholder="Task title" /><button id="addTaskBtn">Add</button></div>
      <div class="row small">
        <select id="recurType">
          <option value="none">No recurrence</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <input id="recurParam" placeholder="Monthly day (e.g. 15)" />
      </div>
      <div class="row small" id="weeklyOptionsWrap">
        <select id="weeklyPreset">
          <option value="all">Every day</option>
          <option value="weekdays">Weekdays</option>
          <option value="weekends">Weekends</option>
          <option value="custom">Custom days</option>
        </select>
      </div>
      <div class="row day-pills" id="weeklyDaysWrap"></div>
      <div class="row small"><label>Link task to note</label><select id="taskNoteLink"><option value="">None</option></select></div>
      <div class="row"><input id="eventTitle" placeholder="Event title" /><button id="addEventBtn">Event</button></div>
      <div class="row small"><input id="eventStart" type="datetime-local" /><input id="eventEnd" type="datetime-local" /></div>
      <div class="row small"><label>Link event to note</label><select id="eventNoteLink"><option value="">None</option></select></div>
      <div id="todayItems"></div>
    </aside>
  </main>

  <dialog id="importDialog">
    <p>Import mode?</p>
    <button id="mergeImportBtn">Merge</button>
    <button id="replaceImportBtn">Replace</button>
  </dialog>

  <div id="commandPalette" class="hidden">
    <input id="commandInput" placeholder="Type command..." />
    <ul id="commandList"></ul>
  </div>

  <script type="module" src="app/main.js"></script>
</body>
</html>
